<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1200px;
  height: 630px;
  overflow: hidden;
  background-color: #f8f9fa;
  background-image:
    linear-gradient(to right, rgba(194, 198, 212, 0.25) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(194, 198, 212, 0.25) 1px, transparent 1px);
  background-size: 40px 40px;
  font-family: 'IBM Plex Serif', serif;
  display: flex;
  flex-direction: column;
}

@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Serif:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600&display=swap');

.card {
  margin: 40px;
  flex: 1;
  background: #ffffff;
  border-top: 6px solid #003f87;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 48px 56px 40px;
  position: relative;
  overflow: hidden;
}

/* Decorative corner accent */
.card::after {
  content: '';
  position: absolute;
  bottom: 0;
  right: 0;
  width: 200px;
  height: 200px;
  background: linear-gradient(135deg, transparent 50%, rgba(0, 63, 135, 0.04) 50%);
}

.header {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-icon {
  width: 32px;
  height: 32px;
  background: #003f87;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 18px;
  font-weight: 600;
  color: #ffffff;
}

.logo-text {
  font-family: 'IBM Plex Serif', serif;
  font-size: 20px;
  font-weight: 700;
  color: #191c1d;
  letter-spacing: -0.02em;
}

.logo-separator {
  width: 4px;
  height: 4px;
  background: #003f87;
  border-radius: 50%;
  margin-left: 4px;
}

.body {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 32px 0 24px;
}

.label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  color: #727784;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-bottom: 20px;
}

.title {
  font-family: 'IBM Plex Serif', serif;
  font-size: 42px;
  font-weight: 700;
  color: #191c1d;
  line-height: 1.2;
  letter-spacing: -0.02em;
  max-width: 900px;
}

.title.long {
  font-size: 34px;
}

.title.very-long {
  font-size: 28px;
}

.tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 28px;
}

.tag {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  color: #424752;
  background: #edeeef;
  padding: 4px 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-top: 1px solid rgba(194, 198, 212, 0.5);
  padding-top: 20px;
}

.url {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px;
  color: #003f87;
  font-weight: 500;
  letter-spacing: 0.02em;
}

.date {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: #727784;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.accent-bar {
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 3px;
  background: linear-gradient(to bottom, #003f87, rgba(0, 63, 135, 0.1));
}
</style>
</head>
<body>
<div class="card">
  <div class="accent-bar"></div>
  <div class="header">
    <div class="logo-icon">&gt;_</div>
    <span class="logo-text">LucaSacchi.net</span>
    <div class="logo-separator"></div>
  </div>
  <div class="body">
    <div class="label">{{LABEL}}</div>
    <div class="title" id="title">{{TITLE}}</div>
    <div class="tags" id="tags">{{TAGS}}</div>
  </div>
  <div class="footer">
    <span class="url">{{URL}}</span>
    <span class="date">{{DATE}}</span>
  </div>
</div>
<script>
  // Adjust title font size based on length
  var titleEl = document.getElementById('title');
  var text = titleEl.textContent;
  if (text.length > 80) titleEl.classList.add('very-long');
  else if (text.length > 50) titleEl.classList.add('long');
</script>
</body>
</html>
