<script src="https://cdn.tailwindcss.com"></script>
<script id="tailwind-config">
tailwind.config = {
  theme: {
    extend: {
      fontFamily: {
        headline: ['IBM Plex Serif', 'serif'],
        body: ['Inter', 'sans-serif'],
        label: ['IBM Plex Mono', 'monospace'],
      },
      colors: {
        primary: '#003f87',
        'primary-container': '#0056b3',
        surface: '#f8f9fa',
        'surface-container-low': '#f0f1f2',
        'surface-container-high': '#e8e9ea',
        'on-surface': '#191c1d',
        'on-surface-variant': '#424752',
        outline: '#72787e',
        'outline-variant': '#c4cad0',
        error: '#ba1a1a',
      },
    },
  },

<style>
  body {
    background-image: 
      linear-gradient(rgba(115, 120, 126, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(115, 120, 126, 0.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }

<body class="bg-surface text-on-surface font-body">
<div class="min-h-screen flex flex-col">
  <nav class="bg-surface-container-low/80 backdrop-blur-xl w-full sticky top-0 z-50 border-b border-outline-variant/20">
    <div class="flex justify-between items-center px-12 py-6 max-w-7xl mx-auto">
      <div class="flex items-center gap-2">
        <span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">terminal</span>
        <a class="text-xl font-headline font-black tracking-tighter text-on-primary-fixed" href="/">LucaSacchi.net</a>
      </div>
    </div>
  </nav>

  <main class="flex-1 flex items-center justify-center px-6 py-24">
    <div class="max-w-2xl w-full bg-surface-container-low border-t-4 border-primary p-12 rounded-sm shadow-lg">
      <div class="text-center">
        <div class="flex justify-center mb-6">
          <span class="material-symbols-outlined text-primary text-6xl" style="font-variation-settings: 'FILL' 1;">check_circle</span>
        </div>
        
        <h1 class="text-3xl font-headline font-bold text-on-surface mb-4" data-i18n="thankYou.heading">Grazie!</h1>
        
        <p class="text-lg text-on-surface-variant mb-2" data-i18n="thankYou.subtitle">Thank you for reaching out</p>
        
        <p class="text-base text-on-surface-variant leading-relaxed mb-8" data-i18n="thankYou.message">Your message has been received. I'll review it and get back to you as soon as possible.</p>
        
        <div class="bg-primary/10 border-l-4 border-primary p-4 mb-8 text-left">
          <p class="text-sm text-on-surface font-label uppercase tracking-wider" data-i18n="thankYou.note">
            <span class="font-bold">Note:</span> Please check your email inbox and spam folder for my response.
          </p>
        </div>

        <a href="/" class="inline-flex items-center gap-2 bg-primary text-on-primary font-label text-sm uppercase tracking-widest px-8 py-3 hover:bg-primary-container transition-colors rounded-none">
          <span data-i18n="thankYou.backHome">Back to Home</span>
          <span class="material-symbols-outlined text-base">arrow_forward</span>
        </a>
      </div>
    </div>
  </main>

  <footer class="bg-surface-container-low border-t border-outline-variant/20 mt-24">
    <div class="max-w-7xl mx-auto px-12 py-12">
      <p class="text-xs text-on-surface-variant font-label" data-i18n="footer.copyright">&copy; LucaSacchi.net.</p>
    </div>
  </footer>
</div>

<script src="/i18n.js"></script>
<script>
(function() {
  function getPreferredLanguage() {
    var cookieRow = document.cookie.split('; ').find(function(row) { return row.startsWith('lsn_lang='); });
    if (cookieRow) {
      var langCookie = cookieRow.split('=')[1];
      if (langCookie) return langCookie;
    }
    var browserLang = navigator.language || navigator.userLanguage;
    if (browserLang && browserLang.startsWith('it')) return 'it';
    if (browserLang && browserLang.startsWith('en')) return 'en';
    return 'it';
  }

  var currentLang = getPreferredLanguage();
  
  if (window.i18n && window.i18n.initI18n) {
    window.i18n.initI18n(currentLang);
    
    document.querySelectorAll('[data-i18n]').forEach(function(el) {
      var key = el.getAttribute('data-i18n');
      var text = window.i18n.t(key, currentLang);
      if (text) el.textContent = text;
    });

    document.querySelectorAll('[data-i18n-placeholder]').forEach(function(el) {
      var key = el.getAttribute('data-i18n-placeholder');
      var text = window.i18n.t(key, currentLang);
      if (text) el.placeholder = text;
    });

    document.title = window.i18n.t('thankYou.pageTitle', currentLang, 'Thank You — LucaSacchi.net');
  }
})();
</script>
</body>
</html>
